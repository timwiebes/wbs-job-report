name: WBS Job Report

on:
  schedule:
    # 19:00 UTC = 7am NZST / 8am NZDT
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      debug_order_id:
        description: "Set to an order_id to dump its raw order_infos JSON instead of running the normal report (no email sent)."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run job report
        env:
          TABULA_EMAIL: ${{ secrets.TABULA_EMAIL }}
          TABULA_PASSWORD: ${{ secrets.TABULA_PASSWORD }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          MAIL_SENDER: accounts@wbspraying.co.nz
          MAIL_TO: paul@wbspraying.co.nz
          SINCE_DAYS: "2"
          DEBUG_ORDER_ID: ${{ github.event.inputs.debug_order_id }}
        run: python job_report.py

      - name: Commit updated state
        if: github.event.inputs.debug_order_id == ''
        run: |
          git config user.name "wbs-job-report-bot"
          git config user.email "actions@github.com"
          git add data/seen_orders.json
          git diff --cached --quiet || git commit -m "Update seen orders"
          git push
